<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Feedback Portal</title>
<!-- EmailJS Library -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink:#16213E;
  --ink-soft:#22305A;
  --paper:#FAF8F3;
  --paper-dim:#F1ECDF;
  --rule:#D9D2C0;
  --brass:#B8862E;
  --brass-deep:#8C661E;
  --slate:#525866;
  --slate-light:#8B8F99;
  --white:#FFFFFF;
  --radius:3px;
  --max-w:860px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}
body{min-height:100vh;}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}

a{color:var(--brass-deep);}

/* ---------- layout shells ---------- */
.topbar{
  background:var(--ink);color:var(--paper);
  padding:18px 24px;border-bottom:3px solid var(--brass);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
}
.topbar .brand{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;letter-spacing:.01em;}
.topbar .brand small{display:block;font-family:'Inter';font-weight:400;font-size:.7rem;color:var(--brass);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.topbar .brand-row{display:flex;align-items:center;gap:12px;}
.topbar .brand-row img.logo-img{height:44px;width:auto;object-fit:contain;flex-shrink:0;}
.topbar .back-link{color:var(--paper);font-size:.82rem;text-decoration:none;opacity:.85;font-family:'IBM Plex Mono',monospace;}
.topbar .back-link:hover{opacity:1;text-decoration:underline;}

.wrap{max-width:var(--max-w);margin:0 auto;padding:40px 24px 80px;}
.wrap.narrow{max-width:480px;}

footer{max-width:var(--max-w);margin:0 auto;padding:0 24px 50px;text-align:center;}
footer .admin-link{font-size:.72rem;color:var(--slate-light);font-family:'IBM Plex Mono',monospace;text-decoration:none;letter-spacing:.05em;}
footer .admin-link:hover{color:var(--slate);}

/* ---------- course select ---------- */
.intro-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-deep);margin-bottom:6px;}
.intro-title{font-size:1.9rem;margin:0 0 8px;}
.intro-sub{color:var(--slate);font-size:.95rem;margin:0 0 32px;max-width:60ch;}

.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.course-card{
  background:var(--white);border:1px solid var(--rule);border-radius:var(--radius);
  padding:20px;cursor:pointer;text-align:left;transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  display:flex;flex-direction:column;gap:8px;
}
.course-card:hover,.course-card:focus-visible{
  border-color:var(--brass);transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(22,33,62,.08);
}
.course-card .code{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.1em;color:var(--brass-deep);}
.course-card .title{font-family:'Fraunces',serif;font-size:1.08rem;line-height:1.3;}
.course-card .cta{font-size:.78rem;color:var(--slate-light);margin-top:auto;}

/* ---------- login ---------- */
.card{background:var(--white);border:1px solid var(--rule);border-radius:var(--radius);padding:32px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--ink);margin-bottom:6px;}
.field input{
  width:100%;padding:11px 12px;border:1px solid var(--rule);border-radius:var(--radius);
  font-family:'Inter';font-size:.95rem;background:var(--paper);
}
.field input:focus{background:var(--white);}
.field .hint{font-size:.74rem;color:var(--slate-light);margin-top:4px;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--ink);color:var(--paper);border:none;border-radius:var(--radius);
  padding:12px 22px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s ease;
}
.btn:hover{background:var(--ink-soft);}
.btn.brass{background:var(--brass);}
.btn.brass:hover{background:var(--brass-deep);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--rule);}
.btn.ghost:hover{border-color:var(--brass);}
.btn.block{width:100%;}

.err{color:#9B3B3B;font-size:.8rem;margin-top:10px;}
.success-msg{color:#2D6B3F;font-size:.8rem;margin-top:10px;}

/* ---------- form ---------- */
.section{margin-bottom:38px;}
.section-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brass-deep);
  border-bottom:1px solid var(--rule);padding-bottom:8px;margin-bottom:18px;}
.q{margin-bottom:22px;}
.q .q-label{font-size:.92rem;margin-bottom:10px;line-height:1.4;}
.q .required-star{color:var(--brass-deep);margin-left:3px;}

.scale{display:flex;border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;background:var(--white);}
.scale button{
  flex:1;padding:11px 6px;background:var(--white);border:none;border-right:1px solid var(--rule);
  font-size:.78rem;color:var(--slate);cursor:pointer;text-align:center;transition:background .12s ease,color .12s ease;
}
.scale button:last-child{border-right:none;}
.scale button.selected{background:var(--brass);color:var(--white);font-weight:600;}
.scale button:hover:not(.selected){background:var(--paper-dim);}

textarea.ruled{
  width:100%;border:1px solid var(--rule);border-radius:var(--radius);
  padding:6px 12px;font-family:'Inter';font-size:.92rem;line-height:28px;resize:vertical;min-height:112px;
  background-color:var(--white);
  background-image:repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--rule) 28px);
  background-position:0 4px;
}

.submit-bar{
  position:sticky;bottom:0;background:var(--paper);border-top:1px solid var(--rule);
  padding:16px 0;margin-top:30px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.submit-bar .status{font-size:.78rem;color:var(--slate-light);font-family:'IBM Plex Mono',monospace;}

/* ---------- success ---------- */
.success-wrap{text-align:center;padding:60px 20px;}
.stamp{
  display:inline-block;border:3px solid var(--brass);color:var(--brass-deep);
  font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.18em;
  padding:16px 30px;transform:rotate(-5deg);animation:stampIn .45s cubic-bezier(.2,.9,.3,1.2);
  font-size:.95rem;font-weight:600;
}
@keyframes stampIn{from{opacity:0;transform:rotate(-5deg) scale(2.2);}to{opacity:1;transform:rotate(-5deg) scale(1);}}
.success-wrap p{color:var(--slate);margin-top:24px;}

/* ---------- admin ---------- */
.admin-table{width:100%;border-collapse:collapse;margin-top:10px;}
.admin-table th,.admin-table td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--rule);font-size:.85rem;}
.admin-table th{font-family:'IBM Plex Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-light);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-row .label{flex:0 0 230px;font-size:.82rem;color:var(--slate);}
.bar-track{flex:1;background:var(--paper-dim);border-radius:2px;height:10px;overflow:hidden;}
.bar-fill{height:100%;background:var(--brass);}
.bar-row .val{flex:0 0 50px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--ink);}
.comment-block{border:1px solid var(--rule);border-radius:var(--radius);padding:14px;margin-bottom:10px;background:var(--white);}
.comment-block .meta{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--slate-light);margin-bottom:6px;}
.comment-block .q{font-size:.74rem;color:var(--brass-deep);text-transform:uppercase;letter-spacing:.06em;margin-top:8px;}
.comment-block p{margin:4px 0 0;font-size:.86rem;line-height:1.45;}
.empty{color:var(--slate-light);font-size:.85rem;padding:20px 0;}

@media(max-width:560px){
  .scale{flex-direction:column;}
  .scale button{border-right:none;border-bottom:1px solid var(--rule);text-align:left;padding:10px 14px;}
  .scale button:last-child{border-bottom:none;}
  .bar-row{flex-wrap:wrap;}
  .bar-row .label{flex:1 1 100%;}
}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--paper);font-family:Inter,sans-serif;color:var(--ink);">
    <div style="text-align:center;">
      <p style="font-size:1.2rem;margin-bottom:20px;">Loading IARS Feedback System...</p>
      <div style="width:50px;height:50px;border:3px solid var(--rule);border-top:3px solid var(--brass);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;" id="spinner"></div>
    </div>
  </div>
</div>

<style>
@keyframes spin {

/* ============================================================
   STORAGE
   ============================================================ */
async function saveResponse(course_id, learner_data, answers) {
  const entry = {
    course_id,
    learner_name: learner_data.name || "Anonymous",
    learner_email: learner_data.email || "",
    timestamp: new Date().toISOString(),
    ratings: {},
    comments: {}
  };
  
  RATING_IDS.forEach(id => {
    entry.ratings[id] = answers[id] ? parseInt(answers[id]) : null;
  });
  
  TEXT_IDS.forEach(id => {
    entry.comments[id] = answers[id] || "";
  });
  
  const key = `feedback_${course_id}_${Date.now()}`;
  localStorage.setItem(key, JSON.stringify(entry));
  
  return entry;
}

async function getResponses(course_id) {
  const results = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith("feedback_" + course_id + "_")) {
      results.push(JSON.parse(localStorage.getItem(key)));
    }
  }
  return results.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
}

   ============================================================ */
async function sendFeedbackEmail(entry) {
  // Check if EmailJS is properly configured
  if (!EMAILJS_SERVICE_ID || EMAILJS_SERVICE_ID === "YOUR_SERVICE_ID") {
    console.warn("EmailJS not configured - skipping email send");
    return false; // Fail silently but continue with submission
  }
  
  // Format ratings summary
  const ratingsSummary = RATING_IDS
    .map(id => {
      const question = QUESTIONS.flatMap(s => s.items).find(q => q.id === id);
      const value = entry.ratings[id];
      return `${question.label}: ${value ? value + '/5' : 'Not answered'}`;
    })
    .join('\n');
  
  // Format comments summary
  const commentsSummary = TEXT_IDS
    .map(id => {
      const question = QUESTIONS.flatMap(s => s.items).find(q => q.id === id);
      const value = entry.comments[id];
      return value ? `${question.label}:\n${value}` : '';
    })
    .filter(c => c)
    .join('\n\n');
  
  const emailData = {
    course_title: state.course.title,
    course_code: state.course.id,
    learner_name: entry.learner_name,
    learner_email: entry.learner_email || 'Not provided',
    ratings_summary: ratingsSummary,
    comments_summary: commentsSummary || 'No comments provided',
    timestamp: new Date(entry.timestamp).toLocaleString(),
    to_email: ADMIN_EMAIL
  };
  
  try {
    const response = await emailjs.send(
      EMAILJS_SERVICE_ID,
      EMAILJS_TEMPLATE_ID,
      emailData
    );
    console.log("Email sent successfully:", response);
    return true;
  } catch (error) {
    console.error("EmailJS error:", error);
    // Fail silently - still save locally even if email fails
    return false;
  }
}

/* ============================================================
   UTILITY
   ============================================================ */
function escapeHtml(text) {
  if (!text) return "";
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function average(arr) {
  if (!arr.length) return 0;
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(v => {
    if (typeof v === "string" && (v.includes(",") || v.includes('"') || v.includes("\n"))) {
      return '"' + v.replace(/"/g, '""') + '"';
    }
    return v;
  }).join(",")).join("\n");
  
  const blob = new Blob([csv], {type: "text/csv;charset=utf-8;"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

   RENDER

}

/* ============================================================

   ============================================================ */
function renderForm(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="topbar">
      <div class="brand-row">${LOGO_SRC ? `<img class="logo-img" src="${LOGO_SRC}" alt="${escapeHtml(BRAND_NAME)} logo">` : ''}<div class="brand">${escapeHtml(BRAND_NAME)}<small>Feedback System</small></div></div>
      <a class="back-link" href="#" id="back">← Change course</a>
    </div>
    <div class="wrap narrow">
      <div class="intro-eyebrow">Feedback</div>
      <h1 class="intro-title">${escapeHtml(state.course.title)}</h1>
      <p class="intro-sub" style="color:var(--slate);font-size:.95rem;">Your honest feedback is valuable and completely confidential.</p>
      
      <div id="form-content"></div>
      
      <div class="submit-bar">
        <span class="status" id="status"></span>
        <div style="display:flex;gap:12px;">
          <button class="btn ghost" id="cancel">Back</button>
          <button class="btn brass" id="submit" ${state.saving ? "disabled" : ""}>
            ${state.saving ? "Submitting..." : "Submit feedback"}
          </button>
        </div>
      </div>
    </div>
  `;
  
  const formContent = app.querySelector("#form-content");
  formContent.innerHTML = QUESTIONS.map(section => `
    <div class="section">
      <div class="section-eyebrow">${escapeHtml(section.category)}</div>
      ${section.items.map(q => {
        if (q.type === "rating") {
          const selected = state.answers[q.id];
          return `
            <div class="q">
              <label class="q-label">${escapeHtml(q.label)}<span class="required-star">*</span></label>
              <div class="scale" data-id="${q.id}">
                ${SCALE.map(s => `
                  <button class="scale-btn ${selected == s.v ? "selected" : ""}" data-val="${s.v}">${s.l}</button>
                `).join("")}
              </div>
            </div>
          `;
        } else {
          const value = state.answers[q.id] || "";
          return `
            <div class="q">
              <label class="q-label">${escapeHtml(q.label)}</label>
              <textarea class="ruled" data-id="${q.id}" placeholder="Optional">${escapeHtml(value)}</textarea>
            </div>
          `;
        }
      }).join("")}
    </div>
  `).join("");
  
  // Scale buttons
  formContent.querySelectorAll(".scale-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const id = btn.parentElement.dataset.id;
      state.answers[id] = btn.dataset.val;
      
      btn.parentElement.querySelectorAll(".scale-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
    });
  });
  
  // Text areas
  formContent.querySelectorAll("textarea.ruled").forEach(ta => {
    ta.addEventListener("change", () => {
      state.answers[ta.dataset.id] = ta.value;
    });
  });
  
  // Back button
  app.querySelector("#back").addEventListener("click", (e) => {
    e.preventDefault();
    state.screen = "select-course";
    state.course = null;
    state.answers = {};
    render();
  });
  
  // Cancel button
  app.querySelector("#cancel").addEventListener("click", () => {
    state.screen = "select-course";
    state.course = null;
    state.answers = {};
    render();
  });
  
  // Submit button
  app.querySelector("#submit").addEventListener("click", handleSubmit);
}

async function handleSubmit() {
  // Validate required ratings
  const missingRequired = RATING_IDS.filter(id => !state.answers[id]);
  if (missingRequired.length > 0) {
    state.error = "Please answer all required questions.";
    render();
    return;
  }
  
  state.saving = true;
  state.error = "";
  render();
  
  try {
    const entry = await saveResponse(state.course.id, state.learner, state.answers);
    
    // Send email
    await sendFeedbackEmail(entry);
    
    state.saving = false;
    state.screen = "success";
    render();
  } catch (err) {
    state.saving = false;
    state.error = "Error saving feedback. Please try again.";
    render();
  }
}

async function renderAdminDashboard(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="topbar">
      <div class="brand-row">${LOGO_SRC ? `<img class="logo-img" src="${LOGO_SRC}" alt="${escapeHtml(BRAND_NAME)} logo">` : ''}<div class="brand">${escapeHtml(BRAND_NAME)}<small>Admin Dashboard</small></div></div>
      <a class="back-link" href="#" id="back">← Learner view</a>
    </div>
    <div class="wrap">
      <div class="intro-eyebrow">Overview</div>
      <h1 class="intro-title" style="font-size:1.5rem;">Responses by course</h1>
      <div id="overview" class="empty">Loading…</div>

      <div class="intro-eyebrow" style="margin-top:40px;">Course Detail</div>
      <div class="field" style="max-width:320px;">
        <label for="course-pick">Choose a course</label>
        <select id="course-pick" style="width:100%;padding:10px;border:1px solid var(--rule);border-radius:3px;font-family:'Inter';">
          ${COURSES.map(c=>`<option value="${c.id}" ${c.id===state.adminCourse?"selected":""}>${c.id} — ${escapeHtml(c.title)}</option>`).join("")}
        </select>
      </div>
      <div id="detail" class="empty">Loading…</div>
    </div>
  `;
  app.querySelector("#back").addEventListener("click",(e)=>{e.preventDefault(); state.screen="select-course"; render();});
  app.querySelector("#course-pick").addEventListener("change",(e)=>{
    state.adminCourse = e.target.value;
    renderDetail();
  });

  // overview counts
  const counts = await Promise.all(COURSES.map(async c => ({c, list: await getResponses(c.id)})));
  const overviewEl = app.querySelector("#overview");
  overviewEl.outerHTML = `
    <table class="admin-table" id="overview">
      <thead><tr><th>Code</th><th>Course</th><th>Responses</th><th>Avg overall</th></tr></thead>
      <tbody>
        ${counts.map(({c,list})=>{
          const overalls = list.map(r=>r.ratings[735]).filter(v=>v!=null);
          return `<tr><td class="mono">${c.id}</td><td>${escapeHtml(c.title)}</td><td>${list.length}</td><td>${overalls.length ? average(overalls).toFixed(2)+" / 5" : "—"}</td></tr>`;
        }).join("")}
      </tbody>
    </table>
  `;

  renderDetail();
}

async function renderDetail(){
  const app = document.getElementById("app");
  const detailEl = app.querySelector("#detail");
  if(!detailEl) return;
  detailEl.innerHTML = "Loading…";
  const course = COURSES.find(c=>c.id===state.adminCourse);
  const list = await getResponses(course.id);

  if(!list.length){
    detailEl.innerHTML = `<div class="empty">No responses yet for ${escapeHtml(course.title)}.</div>`;
    return;
  }

  // Calculate rating percentages
  const ratingAnalysis = RATING_IDS.map(id=>{
    const question = QUESTIONS.flatMap(s=>s.items).find(q=>q.id===id);
    const vals = list.map(r=>r.ratings[id]).filter(v=>v!=null);
    const avg = vals.length ? average(vals) : 0;
    const percentage = avg ? ((avg / 5) * 100).toFixed(0) : 0;
    
    // Count responses for each scale value
    const scaleBreakdown = {};
    SCALE.forEach(s => {
      scaleBreakdown[s.v] = vals.filter(v => v === s.v).length;
    });
    
    return {
      id,
      label: question.label,
      avg: avg.toFixed(2),
      percentage: percentage,
      scaleBreakdown,
      totalResponses: vals.length
    };
  });

  // Build analysis rows with percentages
  const ratingRows = ratingAnalysis.map(r => `
    <div class="bar-row">
      <div class="label">${escapeHtml(r.label)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${r.percentage}%;"></div></div>
      <div class="val mono">${r.percentage}% (${r.avg}/5)</div>
    </div>
    <div class="scale-breakdown" style="margin:8px 0 16px 0; padding-left:10px; font-size:.78rem; color:var(--slate-light);">
      ${SCALE.map(s => {
        const count = r.scaleBreakdown[s.v] || 0;
        const pct = r.totalResponses ? ((count / r.totalResponses) * 100).toFixed(0) : 0;
        return `<div style="display:inline-block; margin-right:14px;">${s.l}: ${count} (${pct}%)</div>`;
      }).join("")}
    </div>
  `).join("");

  const comments = list.slice().reverse().map(r=>`
    <div class="comment-block">
      <div class="meta">Anonymous · ${new Date(r.timestamp).toLocaleString()}</div>
      ${TEXT_IDS.map(id=>{
        const q = QUESTIONS.flatMap(s=>s.items).find(qq=>qq.id===id);
        return r.comments[id] ? `<div class="q">${escapeHtml(q.label)}</div><p>${escapeHtml(r.comments[id])}</p>` : "";
      }).join("")}
    </div>
  `).join("");

  detailEl.innerHTML = `
    <p style="color:var(--slate);font-size:.85rem;">${list.length} response(s) for <strong>${escapeHtml(course.title)}</strong></p>
    <div style="margin:18px 0 30px;">${ratingRows}</div>
    <button class="btn ghost" id="export-btn">Download CSV</button>
    <div style="margin-top:30px;"><div class="intro-eyebrow">Learner Comments</div>${comments}</div>
  `;

  detailEl.querySelector("#export-btn").addEventListener("click", ()=>{
    const header = ["Timestamp", ...RATING_IDS.map(id=>"Q"+id), ...TEXT_IDS.map(id=>"Q"+id)];
    const rows = [header, ...list.map(r=>[
      r.timestamp,
      ...RATING_IDS.map(id=>r.ratings[id] ?? ""),
      ...TEXT_IDS.map(id=>r.comments[id] ?? ""),
    ])];
    downloadCSV(course.id+"_feedback.csv", rows);
  });
}
